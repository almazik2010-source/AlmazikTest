<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Math Quiz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --border: #2a2a32;
      --accent: #c8f251;
      --accent-dim: #9ab83a;
      --text: #f0efe8;
      --muted: #888780;
      --success: #5dcaa5;
      --danger: #f0997b;
      --radius: 12px;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header .tag {
      display: inline-block;
      background: var(--accent);
      color: #0e0e10;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 1rem;
    }

    header h1 {
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .quiz-card {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    .progress-bar-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .question-number {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .question-text {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 2rem;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .option-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      text-align: center;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: #1a1f10;
      transform: translateY(-2px);
    }

    .option-btn.correct {
      border-color: var(--success);
      background: #0a2018;
      color: var(--success);
    }

    .option-btn.wrong {
      border-color: var(--danger);
      background: #200e08;
      color: var(--danger);
    }

    .option-btn:disabled { cursor: default; }

    .feedback {
      min-height: 1.5rem;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-align: center;
      transition: opacity 0.2s;
    }

    .feedback.correct { color: var(--success); }
    .feedback.wrong   { color: var(--danger); }

    .next-btn {
      width: 100%;
      background: var(--accent);
      color: #0e0e10;
      border: none;
      border-radius: var(--radius);
      padding: 0.9rem 1.5rem;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: none;
    }

    .next-btn:hover { background: var(--accent-dim); transform: translateY(-1px); }

    .result-card {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      text-align: center;
      display: none;
    }

    .result-card .score-big {
      font-size: 5rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .result-card .score-label {
      font-size: 1.1rem;
      color: var(--muted);
      margin-top: 0.5rem;
      margin-bottom: 2rem;
    }

    .result-card .message {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 2rem;
    }

    .retry-btn {
      background: var(--accent);
      color: #0e0e10;
      border: none;
      border-radius: var(--radius);
      padding: 0.9rem 2.5rem;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .retry-btn:hover { background: var(--accent-dim); }

    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header>
    <div class="tag">Quiz Time</div>
    <h1>Math <span>Challenge</span></h1>
    <p>Test your arithmetic skills</p>
  </header>

  <div class="quiz-card" id="quizCard">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="question-number" id="questionNumber"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">Next question →</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="score-big" id="scoreBig"></div>
    <div class="score-label" id="scoreLabel"></div>
    <div class="message" id="resultMessage"></div>
    <button class="retry-btn" onclick="startQuiz()">Try again</button>
  </div>

  <footer>math-quiz &nbsp;·&nbsp; github pages</footer>

  <script>
    const questions = [
      { q: "What is 2 + 2?",          correct: 4,   options: [3, 4, 5, 22]  },
      { q: "What is 7 × 8?",          correct: 56,  options: [54, 56, 58, 64] },
      { q: "What is 144 ÷ 12?",       correct: 12,  options: [10, 11, 12, 13] },
      { q: "What is 15 − 9?",         correct: 6,   options: [4, 5, 6, 7]   },
      { q: "What is 3²?",             correct: 9,   options: [6, 8, 9, 12]  },
      { q: "What is 25% of 200?",     correct: 50,  options: [25, 50, 75, 100] },
      { q: "What is √64?",            correct: 8,   options: [6, 7, 8, 9]   },
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    function shuffle(arr) {
      return arr.slice().sort(() => Math.random() - 0.5);
    }

    function startQuiz() {
      current = 0;
      score = 0;
      document.getElementById('quizCard').style.display = '';
      document.getElementById('resultCard').style.display = 'none';
      renderQuestion();
    }

    function renderQuestion() {
      answered = false;
      const q = questions[current];
      const total = questions.length;

      document.getElementById('progressBar').style.width = ((current / total) * 100) + '%';
      document.getElementById('questionNumber').textContent = `Question ${current + 1} of ${total}`;
      document.getElementById('questionText').textContent = q.q;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('nextBtn').style.display = 'none';

      const grid = document.getElementById('optionsGrid');
      grid.innerHTML = '';
      const opts = shuffle(q.options);
      opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.addEventListener('click', () => checkAnswer(opt, q.correct));
        grid.appendChild(btn);
      });
    }

    function checkAnswer(chosen, correct) {
      if (answered) return;
      answered = true;

      const buttons = document.querySelectorAll('.option-btn');
      const fb = document.getElementById('feedback');

      buttons.forEach(btn => {
        btn.disabled = true;
        const val = isNaN(btn.textContent) ? btn.textContent : Number(btn.textContent);
        if (Number(btn.textContent) === correct) btn.classList.add('correct');
        else if (Number(btn.textContent) === chosen) btn.classList.add('wrong');
      });

      if (chosen === correct) {
        score++;
        fb.textContent = '✓ Correct!';
        fb.className = 'feedback correct';
      } else {
        fb.textContent = `✗ The answer is ${correct}`;
        fb.className = 'feedback wrong';
      }

      const nextBtn = document.getElementById('nextBtn');
      nextBtn.style.display = 'block';
      nextBtn.textContent = current + 1 < questions.length ? 'Next question →' : 'See results →';
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      current++;
      if (current < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    });

    function showResult() {
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('quizCard').style.display = 'none';
      const rc = document.getElementById('resultCard');
      rc.style.display = 'block';

      const total = questions.length;
      document.getElementById('scoreBig').textContent = score;
      document.getElementById('scoreLabel').textContent = `out of ${total} correct`;

      let msg = score === total ? '🎉 Perfect score!' :
                score >= total * 0.7 ? '👏 Great job!' :
                score >= total * 0.4 ? '📚 Keep practicing!' : '💪 Don\'t give up!';
      document.getElementById('resultMessage').textContent = msg;
    }

    startQuiz();
  </script>
</body>
</html>
